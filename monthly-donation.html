<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="assets/cursor.svg" sizes="any" />
    <title>Monthly Donation | Safescape Foundation</title>
    <meta
      name="description"
      content="Choose a monthly donation amount and continue to payment to support the dogs at Safescape Foundation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260420_16" />
  </head>
  <body class="form-page-body monthly-donation-page">
    <div class="page-shell">
      <header class="site-header form-page-header">
        <a class="brand" href="index.html#top" aria-label="Safescape Foundation home">
          <img class="brand-logo" src="assets/vector-logo.svg" alt="Safescape Foundation" />
        </a>

        <div class="header-actions">
          <a class="button button-primary button-donate" href="https://pages.razorpay.com/Safescape_Donation" target="_blank" rel="noreferrer">
            Make a Donation
          </a>
        </div>
      </header>

      <main class="form-page-layout form-page-main">
        <section class="form-page-panel form-page-panel-bare section">
          <div class="form-panel form-panel-bare">
            <div class="form-panel-header">
              <h1 class="form-page-title" id="form-title">Monthly Donation</h1>
              <p class="form-page-subtitle" id="form-description">
                Choose an amount below and continue to the payment page. Monthly support helps us provide consistent care,
                food, and treatment for the dogs at Safescape.
              </p>
            </div>

            <form id="monthly-donation-form" class="lead-form monthly-donation-form" data-monthly-donation-page novalidate>
              <div class="form-field monthly-donation-field">
                <p class="monthly-donation-label">Select an amount</p>
                <div class="monthly-donation-options" id="monthly-donation-options" role="group" aria-label="Monthly donation amounts">
                  <button class="monthly-donation-pill" type="button" data-monthly-amount="1000" aria-pressed="false">₹1,000</button>
                  <button class="monthly-donation-pill" type="button" data-monthly-amount="3000" aria-pressed="false">₹3,000</button>
                  <button class="monthly-donation-pill" type="button" data-monthly-amount="5000" aria-pressed="false">₹5,000</button>
                  <button class="monthly-donation-pill" type="button" data-monthly-amount="10000" aria-pressed="false">₹10,000</button>
                </div>
                <p class="section-note">Pick one amount to activate the payment button.</p>
              </div>

              <div class="form-actions-row form-actions-row-stacked monthly-donation-actions">
                <button class="button button-primary" type="button" id="monthly-donation-pay" disabled>
                  Make Payment
                </button>
                <p class="form-status" role="status" aria-live="polite" data-monthly-donation-status></p>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="js/site-config.js?v=20260420_16"></script>
    <script src="js/site-data.js?v=20260420_16"></script>
    <script src="js/main.js?v=20260420_16"></script>
  </body>
</html>
