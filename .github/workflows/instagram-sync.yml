name: Sync Instagram Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Instagram posts and stories
        env:
          GRAPH_API_VERSION: v22.0
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_PROFILE_URL: https://www.instagram.com/safescapefoundation/
          IG_POSTS_LIMIT: '12'
          IG_STORIES_LIMIT: '10'
        run: node scripts/fetch-instagram.mjs

      - name: Commit refreshed feed data
        run: |
          if git diff --quiet data/instagram-posts.json data/instagram-stories.json; then
            echo "No Instagram feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-posts.json data/instagram-stories.json
          git commit -m "chore: refresh instagram feed"
          git push
